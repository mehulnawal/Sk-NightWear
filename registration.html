<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SnowTech">
    <title>Registration | Sk NightWear</title>

    <!-- Favicon -->
    <link rel="icon" href="./assets/images/logo.png">

    <!-- aos link -->
    <link rel="stylesheet" href="./assets/css/aos.css">

    <!-- font awesome cnd -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Bootstrap  icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- bootstrap css link -->

    <!-- main css style  -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- registration css style  -->
    <link rel="stylesheet" href="./assets/css/registration.css">

    <!-- link media css -->
    <link rel="stylesheet" href="./assets/css/media.css">

</head>

<body>

    <section class="register-main">
        <div class="container-fluid">
            <h1>Create account</h1>

            <form action="" method="" class="register-form d-flex flex-column align-items-center">
                <input type="tel" name="firstName" class="form-input" id="firstName" placeholder="First Name">

                <input type="tel" name="lastName" class="form-input" id="lastName" placeholder="Last Name">

                <input type="email" name="email" class="form-input" id="email" placeholder="Email">

                <input type="password" name="password" class="form-input" id="password-user" placeholder="Password">

                <input type="submit" value="Create" id="submit">

            </form>
        </div>
    </section>


    <!-- bootstrap script link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- slick carousel js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.9.0/slick.min.js"

        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- slick carousel js -->

    <script src="./assets/js/aos.js"></script>
    <!-- aos js -->

    <script>
        AOS.init();
    </script>
    <!-- aos script -->

    <!-- jquery cdn -->
    <script src="./assets/js/jquery-3.7.1.min.js"></script>

    <!-- main js -->
    <script src="./assets/js/script.js"></script>

</body>

</html>
